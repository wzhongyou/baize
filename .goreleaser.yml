# .goreleaser.yml
version: 2

project_name: baize

before:
  hooks:
    - go mod tidy

builds:
  - id: baize
    main: ./cli/
    binary: baize
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/wzhongyou/baize/internal/version.Version={{.Version}}
      - -X github.com/wzhongyou/baize/internal/version.Commit={{.ShortCommit}}
      - -X github.com/wzhongyou/baize/internal/version.BuildDate={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - CHANGELOG.md
      - conf/llmgate.toml.example

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: wzhongyou
    name: baize
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - Merge pull request
