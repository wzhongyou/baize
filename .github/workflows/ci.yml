name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']

    steps:
    - uses: actions/checkout@v4

    - name: Clone graphflow (needed by go.mod replace)
      run: git clone https://github.com/wzhongyou/graphflow.git ../graphflow

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: ${{ runner.os }}-go-

    - name: go vet
      run: go vet ./...

    - name: go test
      run: go test -race -count=1 -coverprofile=coverage.out ./...

    - name: Check formatting
      run: test -z "$(gofmt -l .)" || (echo "Files need formatting:" && gofmt -l . && exit 1)

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Clone graphflow (needed by go.mod replace)
      run: git clone https://github.com/wzhongyou/graphflow.git ../graphflow

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build binary
      run: go build -o baize ./cmd/baize/

    - name: Verify binary
      run: ./baize --help
